events {}

http {
    client_max_body_size 200M;       # Allow large video uploads
    proxy_read_timeout    180s;      # PhysMamba takes up to ~30s to process
    proxy_send_timeout    180s;

    server {
        listen 80;
        server_name api.yourapp.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.yourapp.com;

        # Managed by Certbot (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/api.yourapp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.yourapp.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
